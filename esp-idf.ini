[esp-idf]
image=fedora:latest
pre_init_hooks="sudo printf '[eim]\nname=ESP-IDF Installation Manager\nbaseurl=https://dl.espressif.com/dl/eim/rpm/x86_64\nenabled=1\ngpgcheck=0' > /etc/yum.repos.d/espressif-eim.repo"
additional_packages="eim-cli pip git"
init_hooks="eim install"
additional_flags="--privileged"
home="/home/pe/esp-idf"
replace=true
